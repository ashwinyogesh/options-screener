name: Narrative — Classifier (Phase 4)

on:
  push:
    branches: [main]
    paths:
      - 'workers/classifier/**'
      - '.github/workflows/narrative-classifier.yml'
  workflow_dispatch:

concurrency:
  group: narrative-classifier
  cancel-in-progress: true

jobs:
  deploy:
    uses: ./.github/workflows/narrative-worker.yml
    with:
      worker_dir: classifier
      job_name: job-classifier
      image_base: ${{ vars.GHCR_IMAGE_CLASSIFIER }}
    secrets:
      AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS }}
      AZURE_RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
