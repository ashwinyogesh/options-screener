name: Narrative — 00 Deploy Infrastructure (Bicep)

# Subscription-scoped Bicep deployment. Manual trigger only — infra changes
# are deliberate. Validates with what-if before deploying.
#
# Required repo secrets:
#   AZURE_CREDENTIALS               — service principal JSON (Contributor on subscription)
#   AZURE_SUBSCRIPTION_ID           — target subscription
#   NARRATIVE_RESOURCE_GROUP        — resource group name (e.g. options-rg)
#   NARRATIVE_NAME_SUFFIX           — 3-9 char alnum, fed to nameSuffix param
#   NARRATIVE_KV_ADMIN_OBJECT_IDS   — JSON array of AAD object IDs

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "what-if (preview) or deploy"
        required: true
        default: "what-if"
        type: choice
        options:
          - what-if
          - deploy

concurrency:
  group: narrative-infra
  cancel-in-progress: false

jobs:
  bicep:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Bicep lint + build
        run: |
          az bicep build --file infra/main.bicep
          az bicep build --file infra/modules/storage.bicep
          az bicep build --file infra/modules/eventhubs.bicep
          az bicep build --file infra/modules/keyvault.bicep
          az bicep build --file infra/modules/containerapps.bicep
          az bicep build --file infra/modules/monitoring.bicep
          az bicep build --file infra/modules/cosmos.bicep

      - name: Render parameters file
        env:
          NAME_SUFFIX: ${{ secrets.NARRATIVE_NAME_SUFFIX }}
          RESOURCE_GROUP: ${{ secrets.NARRATIVE_RESOURCE_GROUP }}
          KV_ADMIN_OBJECT_IDS: ${{ secrets.NARRATIVE_KV_ADMIN_OBJECT_IDS }}
          COSMOS_PRINCIPAL_IDS: ${{ secrets.NARRATIVE_COSMOS_PRINCIPAL_IDS }}
          COSMOS_LOCATION: ${{ vars.NARRATIVE_COSMOS_LOCATION }}
        run: |
          # Build an ARM parameters file. Using env vars (not direct expression
          # expansion) avoids shell-quoting issues with the JSON arrays.
          echo "$KV_ADMIN_OBJECT_IDS" | jq -e 'type == "array"' > /dev/null \
            || { echo "::error::NARRATIVE_KV_ADMIN_OBJECT_IDS must be a JSON array"; exit 1; }
          # COSMOS_PRINCIPAL_IDS defaults to empty array if unset.
          COSMOS_IDS_JSON="${COSMOS_PRINCIPAL_IDS:-[]}"
          echo "$COSMOS_IDS_JSON" | jq -e 'type == "array"' > /dev/null \
            || { echo "::error::NARRATIVE_COSMOS_PRINCIPAL_IDS must be a JSON array"; exit 1; }
          jq -n \
            --arg suffix "$NAME_SUFFIX" \
            --arg rg "$RESOURCE_GROUP" \
            --arg cosmosLoc "$COSMOS_LOCATION" \
            --argjson admins "$KV_ADMIN_OBJECT_IDS" \
            --argjson cosmosPrincipals "$COSMOS_IDS_JSON" \
            '{
              "$schema": "https://schema.management.azure.com/schemas/2019-04-01/deploymentParameters.json#",
              "contentVersion": "1.0.0.0",
              "parameters": (
                {
                  "nameSuffix": { "value": $suffix },
                  "keyVaultAdminObjectIds": { "value": $admins },
                  "cosmosDataContributorPrincipalIds": { "value": $cosmosPrincipals }
                }
                | if $rg != "" then . + { "resourceGroupName": { "value": $rg } } else . end
                | if $cosmosLoc != "" then . + { "cosmosLocation": { "value": $cosmosLoc } } else . end
              )
            }' > infra/main.parameters.json
          echo "resourceGroupName=$RESOURCE_GROUP"
          echo "nameSuffix=$NAME_SUFFIX"
          echo "kv admin count: $(jq '.parameters.keyVaultAdminObjectIds.value | length' infra/main.parameters.json)"
          echo "cosmos principals: $(jq '.parameters.cosmosDataContributorPrincipalIds.value | length' infra/main.parameters.json)"

      - name: Preserve live worker images
        if: ${{ inputs.mode == 'deploy' }}
        env:
          RESOURCE_GROUP: ${{ secrets.NARRATIVE_RESOURCE_GROUP }}
        run: |
          PLACEHOLDER_APP="mcr.microsoft.com/azuredocs/containerapps-helloworld:latest"
          PLACEHOLDER_JOB="mcr.microsoft.com/k8se/quickstart-jobs:latest"

          read_app_image() {
            local name=$1 placeholder=$2
            local img
            img=$(az containerapp show --name "$name" --resource-group "$RESOURCE_GROUP" \
              --query "properties.template.containers[0].image" -o tsv 2>/dev/null || echo "")
            if [ -n "$img" ] && [ "$img" != "$placeholder" ]; then echo "$img"; else echo ""; fi
          }

          read_job_image() {
            local name=$1
            local img
            img=$(az containerapp job show --name "$name" --resource-group "$RESOURCE_GROUP" \
              --query "properties.template.containers[0].image" -o tsv 2>/dev/null || echo "")
            if [ -n "$img" ] && [ "$img" != "$PLACEHOLDER_JOB" ]; then echo "$img"; else echo ""; fi
          }

          INGESTOR_IMG=$(read_app_image job-ingestor "$PLACEHOLDER_APP")
          EXTRACTOR_IMG=$(read_job_image job-extractor)
          AGGREGATOR_IMG=$(read_job_image job-aggregator)
          CLASSIFIER_IMG=$(read_job_image job-classifier)
          DETECTOR_IMG=$(read_job_image job-narrative-detector)

          echo "Ingestor:   ${INGESTOR_IMG:-placeholder}"
          echo "Extractor:  ${EXTRACTOR_IMG:-placeholder}"
          echo "Aggregator: ${AGGREGATOR_IMG:-placeholder}"
          echo "Classifier: ${CLASSIFIER_IMG:-placeholder}"
          echo "Detector:   ${DETECTOR_IMG:-placeholder}"

          PARAMS=$(cat infra/main.parameters.json)
          [ -n "$INGESTOR_IMG" ]  && PARAMS=$(echo "$PARAMS" | jq --arg v "$INGESTOR_IMG"  '.parameters += {"ingestionImage":  {"value": $v}}')
          [ -n "$EXTRACTOR_IMG" ] && PARAMS=$(echo "$PARAMS" | jq --arg v "$EXTRACTOR_IMG" '.parameters += {"extractorImage":  {"value": $v}}')
          [ -n "$AGGREGATOR_IMG" ] && PARAMS=$(echo "$PARAMS" | jq --arg v "$AGGREGATOR_IMG" '.parameters += {"aggregatorImage": {"value": $v}}')
          [ -n "$CLASSIFIER_IMG" ] && PARAMS=$(echo "$PARAMS" | jq --arg v "$CLASSIFIER_IMG" '.parameters += {"classifierImage": {"value": $v}}')
          [ -n "$DETECTOR_IMG" ]  && PARAMS=$(echo "$PARAMS" | jq --arg v "$DETECTOR_IMG"  '.parameters += {"detectorImage":   {"value": $v}}')
          echo "$PARAMS" > infra/main.parameters.json

      - name: What-if
        if: ${{ inputs.mode == 'what-if' }}
        run: |
          az deployment sub what-if \
            --location eastus \
            --template-file infra/main.bicep \
            --parameters infra/main.parameters.json

      - name: Deploy
        if: ${{ inputs.mode == 'deploy' }}
        run: |
          az deployment sub create \
            --name narrative-$(date +%Y%m%d%H%M%S) \
            --location eastus \
            --template-file infra/main.bicep \
            --parameters infra/main.parameters.json
