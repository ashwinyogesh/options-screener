name: Narrative — 06 Scorer (Phase 6)

on:
  push:
    branches: [main]
    paths:
      - 'workers/scorer/**'
      - '.github/workflows/narrative-scorer.yml'
  workflow_dispatch:

concurrency:
  group: narrative-scorer
  cancel-in-progress: true

jobs:
  deploy:
    uses: ./.github/workflows/narrative-worker.yml
    with:
      worker_dir: scorer
      job_name: job-acs-scorer
      image_base: ${{ vars.GHCR_IMAGE_SCORER }}
    secrets:
      AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS }}
      AZURE_RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
