name: Narrative — Aggregator (Phase 3)

on:
  push:
    branches: [main]
    paths:
      - 'workers/aggregator/**'
      - '.github/workflows/narrative-aggregator.yml'
  workflow_dispatch:

concurrency:
  group: narrative-aggregator
  cancel-in-progress: true

jobs:
  deploy:
    uses: ./.github/workflows/narrative-worker.yml
    with:
      worker_dir: aggregator
      job_name: job-aggregator
      image_base: ${{ vars.GHCR_IMAGE_AGGREGATOR }}
    secrets:
      AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS }}
      AZURE_RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
