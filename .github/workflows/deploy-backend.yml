name: Deploy — Backend to Azure Web App

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-backend
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # No local venv build: Oryx installs requirements on the App Service
      # at deploy time (SCM_DO_BUILD_DURING_DEPLOYMENT=true). Shipping a
      # pre-built Linux venv was bloating the zip and breaking OneDeploy.
      - name: Validate requirements parse
        working-directory: backend
        run: python -m pip install --dry-run -r requirements.txt > /dev/null || true

      - name: Upload artifact for deployment
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: |
            backend/**
            !backend/antenv/**
            !backend/venv/**
            !backend/.venv/**
            !backend/**/__pycache__/**
            !backend/**/*.pyc

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: python-app

      - name: Zip artifact for deployment
        run: zip release.zip ./* -r

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'optionsapi'
          slot-name: 'Production'
          package: release.zip

      - name: Set startup command
        run: |
          az webapp config set \
            --name optionsapi \
            --resource-group options-rg \
            --startup-file "uvicorn main:app --host 0.0.0.0 --port 8000"

      - name: Logout
        run: az logout
        if: always()
