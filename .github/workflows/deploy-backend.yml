name: Deploy — Backend to Azure Web App

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-backend
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # IMPORTANT: build the venv as `antenv/` and SHIP IT.
      # OneDeploy (which azure/webapps-deploy@v3 uses) does NOT run Oryx,
      # so SCM_DO_BUILD_DURING_DEPLOYMENT is ignored on this path. The
      # App Service startup script (`/opt/startup/startup.sh`) activates
      # /home/site/wwwroot/antenv before running uvicorn, so the venv
      # must be present in the artifact. If antenv is missing the app
      # returns 503 ("uvicorn: not found" in the docker log).
      - name: Build antenv virtualenv
        working-directory: backend
        run: |
          python -m venv antenv
          source antenv/bin/activate
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Strip build cruft (keep antenv intact)
        run: |
          find backend -type d -name __pycache__ -prune -exec rm -rf {} +
          find backend -type f -name '*.pyc' -delete

      - name: Upload artifact for deployment
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          # path: backend/ ships the *contents* of backend at the artifact
          # root (main.py, services/, antenv/, ...). Do NOT switch to
          # `backend/**`; that preserves the `backend/` prefix and the
          # startup script can't find antenv or main.
          path: backend/

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: python-app

      - name: Zip artifact for deployment
        run: zip release.zip ./* -r

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'optionsapi'
          slot-name: 'Production'
          package: release.zip

      - name: Set startup command
        run: |
          # Invoke uvicorn as a module so it uses the python on PYTHONPATH
          # (Oryx adds antenv/lib/python3.12/site-packages to PYTHONPATH but
          # does NOT put antenv/bin on PATH, and the `uvicorn` script's
          # shebang baked in the GitHub runner's python path, so running
          # `uvicorn ...` directly yields 'uvicorn: not found' on App Service).
          az webapp config set \
            --name optionsapi \
            --resource-group options-rg \
            --startup-file "python -m uvicorn main:app --host 0.0.0.0 --port 8000"

      - name: Logout
        run: az logout
        if: always()
