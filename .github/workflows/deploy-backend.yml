name: Deploy Backend to Azure App Service

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Build and Deploy

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt --target backend_packages

      - name: Zip backend for deployment
        run: |
          cd backend
          zip -r ../backend.zip . -x "*.pyc" -x "__pycache__/*" -x "venv/*" -x ".venv/*"

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy zip to App Service
        run: |
          az webapp deploy \
            --name optionsapi \
            --resource-group options-rg \
            --src-path backend.zip \
            --type zip

      - name: Set startup command
        run: |
          az webapp config set \
            --name optionsapi \
            --resource-group options-rg \
            --startup-file "uvicorn main:app --host 0.0.0.0 --port 8000"

      - name: Logout
        run: az logout
        if: always()
