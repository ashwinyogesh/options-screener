name: Deploy Backend to Azure App Service

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Build and Deploy

    steps:
      - uses: actions/checkout@v4

      - name: Zip backend for deployment
        run: |
          cd backend
          zip -r ../backend.zip . -x "*.pyc" -x "__pycache__/*" -x "venv/*" -x ".venv/*"

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Enable Oryx build
        run: |
          az webapp config appsettings set \
            --name optionsapi \
            --resource-group options-rg \
            --settings SCM_DO_BUILD_DURING_DEPLOYMENT=true

      - name: Deploy zip to App Service
        run: |
          az webapp deploy \
            --name optionsapi \
            --resource-group options-rg \
            --src-path backend.zip \
            --type zip \
            --timeout 600

      - name: Set startup command
        run: |
          az webapp config set \
            --name optionsapi \
            --resource-group options-rg \
            --startup-file "uvicorn main:app --host 0.0.0.0 --port 8000"

      - name: Logout
        run: az logout
        if: always()
