name: Deploy — Backend to Azure Web App

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-backend
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # No local venv build: Oryx installs requirements on the App Service
      # at deploy time (SCM_DO_BUILD_DURING_DEPLOYMENT=true). Shipping a
      # pre-built Linux venv was bloating the zip and breaking OneDeploy.
      - name: Validate requirements parse
        working-directory: backend
        run: python -m pip install --dry-run -r requirements.txt > /dev/null || true

      - name: Strip dev artifacts before upload
        run: |
          rm -rf backend/antenv backend/venv backend/.venv
          find backend -type d -name __pycache__ -prune -exec rm -rf {} +
          find backend -type f -name '*.pyc' -delete

      - name: Upload artifact for deployment
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          # NOTE: path is a directory (trailing slash). upload-artifact uploads
          # its contents at the root of the artifact so the zip extracts to
          # `main.py`, `services/`, ... — which is what the App Service
          # startup command (`uvicorn main:app`) and Oryx expect. Do NOT
          # switch this to `backend/**`; that preserves the `backend/`
          # prefix and the app ends up under wwwroot/backend/, which fails
          # to start with ModuleNotFoundError: No module named 'main'.
          path: backend/

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: python-app

      - name: Zip artifact for deployment
        run: zip release.zip ./* -r

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'optionsapi'
          slot-name: 'Production'
          package: release.zip

      - name: Set startup command
        run: |
          az webapp config set \
            --name optionsapi \
            --resource-group options-rg \
            --startup-file "uvicorn main:app --host 0.0.0.0 --port 8000"

      - name: Logout
        run: az logout
        if: always()
