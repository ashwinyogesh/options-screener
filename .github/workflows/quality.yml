# Quality gate for the Options Screener.
#
# Runs on every push to main and every pull request:
#   - backend job: ruff lint + pytest (PYTHONPATH=backend so `from services...` resolves)
#   - frontend job: `npm ci && npm run build` (no test script yet; build is the gate)
#
# Deploy workflows (deploy-backend.yml, deploy-frontend.yml) are unaffected.

name: Quality

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install -r backend/requirements-dev.txt

      - name: Ruff lint
        run: ruff check backend scripts

      - name: Pytest
        env:
          PYTHONPATH: backend
        run: pytest backend/tests -q

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build
