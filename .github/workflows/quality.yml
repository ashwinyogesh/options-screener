# Quality gate for the Options Screener.
#
# Runs on every push to main and every pull request:
#   - backend job: ruff lint + pytest (PYTHONPATH=backend so `from services...` resolves)
#   - frontend job: `npm ci && npm test && npm run build`
#
# Deploy workflows (deploy-backend.yml, deploy-frontend.yml) are unaffected.

name: Quality

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install -r backend/requirements-dev.txt

      - name: Ruff lint
        run: ruff check backend scripts

      - name: Pytest
        env:
          PYTHONPATH: backend
        # --disable-socket + --allow-unix-socket blocks real network I/O in CI
        # (any test hitting yfinance / SEC / Azure OpenAI without an explicit
        # @pytest.mark.network + @pytest.mark.enable_socket will fail). The
        # Windows asyncio socketpair caveat documented in pytest.ini does not
        # apply on ubuntu-latest. `-m "not network"` keeps live-service tests
        # out of the default CI run; they must be invoked explicitly.
        run: pytest backend/tests -q --disable-socket --allow-unix-socket -m "not network"

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Test
        working-directory: frontend
        run: npm test

      - name: Build
        working-directory: frontend
        run: npm run build
