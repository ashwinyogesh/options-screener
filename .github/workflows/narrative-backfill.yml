name: Narrative — 07 Backfill (ADR-0030 forward log)

on:
  push:
    branches: [main]
    paths:
      - 'workers/narrative-backfill/**'
      - '.github/workflows/narrative-backfill.yml'
  workflow_dispatch:

concurrency:
  group: narrative-backfill
  cancel-in-progress: true

jobs:
  deploy:
    uses: ./.github/workflows/narrative-worker.yml
    permissions:
      contents: read
      packages: write
      id-token: write
    with:
      worker_dir: narrative-backfill
      job_name: job-narrative-backfill
      image_base: ${{ vars.GHCR_IMAGE_BACKFILL }}
    secrets:
      AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS }}
      AZURE_RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
      GHCR_PAT: ${{ secrets.GHCR_PAT }}
