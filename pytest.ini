[pytest]
testpaths = backend/tests workers/classifier/tests workers/narrative-detector/tests workers/scorer/tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -ra --strict-markers
# NOTE on network isolation:
#   pytest-socket is installed and the ``network`` marker is registered. To
#   actively block sockets, run with ``--disable-socket --allow-unix-socket``
#   (recommended in CI). It is NOT enabled by default because Python's
#   asyncio on Windows uses AF_INET ``socket.socketpair()`` internally to
#   wake the event loop, which pytest-socket cannot distinguish from real
#   network use. Tests that legitimately need the network must be tagged
#   ``@pytest.mark.network`` and either ``@pytest.mark.enable_socket`` or
#   excluded from the CI invocation via ``-m "not network"``.
markers =
    integration: characterization / integration tests (slower, fixture-heavy)
    unit: pure unit tests (fast, no I/O)
    network: opt-in tests that hit live external services (use @pytest.mark.enable_socket or --allow-hosts)
